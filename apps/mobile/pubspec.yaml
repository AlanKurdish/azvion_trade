name: azin_forex
description: "Azin Forex Trading Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  dio: ^5.8.0
  socket_io_client: ^3.0.2
  go_router: ^15.1.2
  get_it: ^8.0.3
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  flutter_widget_from_html_core: ^0.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0a0e1a"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/icon.png

  fonts:
    - family: Rabar
      fonts:
        - asset: assets/fonts/Rabar.ttf
    - family: Rudaw
      fonts:
        - asset: assets/fonts/rudawregular.ttf
